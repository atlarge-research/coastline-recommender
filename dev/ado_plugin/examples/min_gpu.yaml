#
# Minimum-GPU example: the smallest AutoConf-feasible GPU layout, reported with
# Kavier predicted throughput and power. COASTLINE's analogue of autoconf's
# min_gpu_recommender.
#
# Run from the root of the ado repository:
#   run_experiment plugins/custom_experiments/coastline/examples/min_gpu.yaml
entity:
  model_name: granite-3-8b
  method: lora
  gpu_model: NVIDIA-A100-SXM4-80GB
  tokens_per_sample: 2048
  batch_size: 16
  max_gpus: 8
experiments:
  - actuatorIdentifier: custom_experiments
    experimentIdentifier: coastline_min_gpu_recommender
