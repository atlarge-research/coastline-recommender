site_name: Coastline
site_description: Context-aware GPU/datacenter configuration recommender for LLM fine-tuning
site_author: Radu Nicolae · AtLarge Research
repo_url: https://github.com/atlarge-research/coastline-recommender
repo_name: atlarge-research/coastline-recommender
copyright: Coastline — AtLarge Research
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - Overview: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - First recommendation: getting-started/first-recommendation.md
      - Features: getting-started/features.md
  - Guides:
      - Recommend a workload: guides/workload.md
      - Batch recommendations: guides/batch.md
      - Traces: guides/traces.md
      - Tune a predictor: guides/tune.md
      - Dashboard: guides/dashboard.md
  - Concepts:
      - How it works: concepts/how-it-works.md
      - Predictors: concepts/predictors.md
      - Ranking strategies: concepts/strategies.md
  - Reference:
      - CLI commands: reference/cli.md
      - Configuration: reference/configuration.md
      - Python SDK: reference/sdk.md
  - Contributing: contributing.md
