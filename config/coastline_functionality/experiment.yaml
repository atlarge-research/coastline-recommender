# Tunable — changes recommendations, won't break the API.
workload:
  llm_model: "granite-3.1-3b-a800m-instruct"
  fine_tuning_method: "lora"
  gpu_model: "NVIDIA-A100-SXM4-80GB"
  tokens_per_sample: 2048
  batch_size: 8
  gpus_per_node: null
  number_of_nodes: null
system:
  available_gpu_models:
    - "NVIDIA-A100-SXM4-80GB"
    - "NVIDIA-H100-PCIe"
    - "L40S"
    - "NVIDIA-A100-80GB-PCIe"
  max_gpus: 32
  gpu_memory:
    "NVIDIA-A100-SXM4-80GB": 80
    "NVIDIA-H100-PCIe": 80
    "L40S": 48
    "NVIDIA-A100-80GB-PCIe": 80
  constraints:
    max_gpus: 32
    gpus_per_node: 8
    max_nodes: 4

orchestration:
  max_iterations: 3
  convergence_threshold: 0.05
  enable_verification: true
  fallback_on_failure: false
strategy:
  name: "multi_objective"
  preset: "balanced"

predictors:
  performance: "intelligent"
  energy: "kavier_power"
  feasibility: "autoconf"
  autoconf_model_version: "3.1.0"

grid:
  batch_sizes: [4, 8, 16, 32, 64]
  total_gpus: [1, 2, 4, 8, 16, 32]
  top_k: 3
output:
  format: "console"
  save_json: false
  json_path: "output/recommendation.json"
  save_html: false
  html_path: "output/recommendation.html"
  verbose: true
