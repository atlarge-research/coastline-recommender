# The canonical Coastline recommendation policy — every door (CLI, facade/API, UI) falls
# back to this file. It declares HOW to recommend (strategy / predictors / grid). WHERE you
# run (cluster caps) lives in infrastructure.yaml; the workload is optional here and only
# used by `coastline recommend-job --config` single-job mode (batch/trace/UI supply their own).

# Optional: a declared single job for `recommend-job --config`. Omit for a policy-only config.
workload:
  llm_model: "granite-3.1-3b-a800m-instruct"
  fine_tuning_method: "lora"
  gpu_model: "NVIDIA-A100-SXM4-80GB"
  tokens_per_sample: 2048
  batch_size: 8

# How candidates are ranked. The one default is multi_objective/balanced; alt: min_gpu.
strategy:
  name: "multi_objective"
  preset: "balanced"

# The three simulation models: throughput, energy, feasibility.
predictors:
  performance: "intelligent"   # exact cache hit else Kavier physics; alt: kavier, cache, or an ML model name
  energy: "kavier_power"
  feasibility: "autoconf"      # OOM-aware; alt: rules (divisibility-only)

# The search space swept per workload.
grid:
  batch_sizes: [4, 8, 16, 32, 64]
  total_gpus: [1, 2, 4, 8, 16, 32]
  top_k: 3
