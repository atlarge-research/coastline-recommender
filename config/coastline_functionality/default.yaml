# Tunable — changes recommendations, won't break the API.
# Fallback config when no explicit config is given: the CLI's --config default and
# the last candidate in the API/PolicyFactory strategy-config lookup. Same schema
# as config.yaml (strategy:/predictors:/grid:).

# SYSTEM — fallback GPU if grid.gpu_models is empty.
system:
  default_gpu: "NVIDIA-A100-SXM4-80GB"

# STRATEGY — min_gpu on purpose: distinguishes this file from experiment.yaml /
# the built-in defaults (tests rely on that).
strategy:
  name: "min_gpu"
  preset: "balanced"

# PREDICTORS — throughput / energy / feasibility engines.
predictors:
  performance: "intelligent"   # exact cache match first, Kavier physics fallback
  energy: "kavier_power"       # analytical power model
  feasibility: "autoconf"      # OOM-aware AutoConf checker

# GRID — search space: batch_size × total_gpus. gpu_models[0] is the primary GPU.
grid:
  gpu_models:
    - "NVIDIA-A100-SXM4-80GB"
  batch_sizes: [1, 2, 4, 8, 16, 32, 64]
  total_gpus: [1, 2, 4, 8, 16]
