site_name: Coastline
site_description: Context-aware GPU/datacenter configuration recommender for LLM fine-tuning
site_author: Radu Nicolae · AtLarge Research
repo_url: https://github.com/atlarge-research/coastline-recommender
repo_name: atlarge-research/coastline-recommender
copyright: Coastline — AtLarge Research
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - assets/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

nav:
  - Overview: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Components:
      - Recommendation pipeline: components/pipeline.md
      - Performance predictors: components/performance.md
      - Energy predictors: components/energy.md
      - Feasibility: components/feasibility.md
      - Ranking policies: components/policies.md
      - Library & data models: components/library.md
  - Contributing: contributing.md
